<!DOCTYPE html>

<html lang="dz"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>འབྲེལ་སྒྲ་ལྷབ་སྦྱང་།</title>
  <link href="./འབྲེལ་སྒྲ་ལྷབ་སྦྱང་།_files/css2" rel="stylesheet">
</head>
<body>

  <div class="container">
    <h1>འབྲེལ་སྒྲ་ལྷབ་སྦྱང་།</h1>
    <p>ས་སྟོང་ནང་ལུ་ འབྲེལ་བ་ཡོད་པའི་ཕྲད་བཙུགས།</p>

    <!-- Sentence Builder -->
    <div class="sentence">
      <span id="word1">འཕྲིན་ལས་</span>
      <span id="suffixBox" class="wrong">གྱི་</span>
      <span id="word2">ཨམ་སྲུ་</span>
    </div>

    <!-- Options -->
    <div class="options">
      <button onclick="selectSuffix(&#39;གི་&#39;)">གི་</button>
      <button onclick="selectSuffix(&#39;ཀྱི་&#39;)">ཀྱི་</button>
      <button onclick="selectSuffix(&#39;གྱི་&#39;)">གྱི་</button>
      <button onclick="selectSuffix(&#39;འི་&#39;)">ཡི་</button>
      <button onclick="selectSuffix(&#39;ཡི་&#39;)">ཡི་</button>
    </div>

    <!-- Feedback -->
    <p id="feedback">མ་ཕོག། ལོག་བལྟ་གནང་། Try again</p>
    <p id="hint">རྗེས་འཇུག་ ‘ས་’ གི་མཐའ་མར་ འབྲེལ་སྒྲའི་ཕྲད་ག་ཅི་འཐོབ?</p>

    <!-- Controls -->
    <div class="controls">
      <button onclick="reset()">🔄 Reset</button>
    </div>
  </div>

  <script src="./འབྲེལ་སྒྲ་ལྷབ་སྦྱང་།_files/script.js"></script>

</body></html>
